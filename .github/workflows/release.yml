name: release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  license_guard:
    name: Confirm source licenses
    runs-on: ubuntu-latest

    steps:
      - name: Confirm source data redistribution
        env:
          SOURCE_LICENSE_CONFIRMED: ${{ vars.SOURCE_LICENSE_CONFIRMED }}
        run: |
          if [ "${SOURCE_LICENSE_CONFIRMED}" != "true" ]; then
            echo "Set repository variable SOURCE_LICENSE_CONFIRMED=true only after source license confirmation."
            exit 1
          fi

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: license_guard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Validate YAML data
        run: uv run python scripts/validate.py

      - name: Build release artifacts
        run: uv run python scripts/build_release_artifacts.py

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/exports/best-measurements.geojson \
            build/exports/best-measurements.csv \
            build/exports/best-measurements.gpx \
            build/exports/best-measurements.shp.zip \
            build/exports/katalog.sqlite.zip \
            build/exports/metadata.json \
            --title "${GITHUB_REF_NAME}" \
            --notes "Generated catalog artifacts for ${GITHUB_REF_NAME}."
