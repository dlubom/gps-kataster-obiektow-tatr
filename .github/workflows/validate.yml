name: validate

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate code and data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Check formatting
        run: uv run ruff format --check src tests scripts

      - name: Lint
        run: uv run ruff check src tests scripts

      - name: Test
        run: uv run pytest

      - name: Validate YAML data
        run: uv run python scripts/validate.py
